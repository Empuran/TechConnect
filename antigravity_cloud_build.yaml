version: 1.0.0
project_name: TechConnect
target_platforms:
  - ios
  - android

environment:
  flutter_sdk: latest
  dart_sdk: latest

build_steps:
  - name: Fetch Dependencies
    command: flutter pub get
  - name: Run Tests
    command: flutter test
  - name: Build Android APK
    command: flutter build apk --release
    output_path: build/app/outputs/flutter-apk/app-release.apk
  - name: Build Android App Bundle (Play Store)
    command: flutter build appbundle --release
    output_path: build/app/outputs/bundle/release/app-release.aab
  - name: Build iOS App (App Store)
    command: flutter build ipa --release
    output_path: build/ios/ipa/TechConnect.ipa

preview_simulator:
  enabled: true
  default_device: iphone-14-pro
  auto_launch: true

supabase_integration:
  enabled: true
  auto_sync_schema: true
  schema_path: supabase/migrations
