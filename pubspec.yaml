name: techconnect
description: A modern dating app for tech professionals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  cupertino_icons: ^1.0.2
  supabase_flutter: ^1.10.2
  flutter_riverpod: ^2.4.3
  
  # UI & Animations
  flutter_card_swiper: ^2.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  
  # Utilities
  url_launcher: ^6.2.1
  location: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
